<!-- ====== JAMARAT STONE THROWING OVERLAY ====== -->
<style>
/* Throw button */
#jamarThrowBtn{
  display:none; position:fixed; bottom:80px; left:50%; transform:translateX(-50%);
  z-index:9999; background:linear-gradient(135deg,#C9A84C,#8B6914);

}
#jamarThrowBtn:hover{transform:translateX(-50%) scale(1.05);box-shadow:0 6px 32px rgba(201,168,76,0.7);}

#jamarThrowBtn .icon{font-size:22px;}

/* Counter HUD */

.hud-pillar{display:flex;justify-content:space-between;align-items:center;padding:4px 0;font-size:14px;}

/* Stone throw animation overlay (canvas) */
#jamarThrowCanvas{
  display:none; position:fixed; bottom:0; left:50%; transform:translateX(-50%);

#jamarComplete h3{color:#C9A84C;font-size:22px;margin:0 0 8px;}

#jamarComplete button{
  background:linear-gradient(135deg,#C9A84C,#8B6914); color:#fff;

}

/* Bismillah toast */
#jamarBismillah{

  text-shadow:0 2px 20px rgba(201,168,76,0.6); pointer-events:none;

<!-- Throw Button -->
<button id="jamarThrowBtn" onclick="throwStone()">
  <span class="icon">🪨</span> Throw Stone <span id="throwLabel">(1/7)</span>
</button>

<!-- Counter HUD -->
<div id="jamarHUD">
  <h4>⬡ Rami al-Jamarat</h4>
  <div class="hud-pillar">
    <span class="name">Sughra (Small)</span>
    <span class="count" id="hudSmall">0/7</span>
  </div>
  <div class="hud-divider"></div>
  <div class="hud-pillar">
    <span class="name">Wusta (Medium)</span>

  <div class="hud-divider"></div>
  <div class="hud-pillar">
    <span class="name">Aqaba (Large)</span>
    <span class="count" id="hudLarge">0/7</span>
  </div>
  <div class="hud-divider"></div>
  <div class="hud-total">Total: <strong id="hudTotal">0/21</strong></div>

<!-- Throw animation canvas -->
<canvas id="jamarThrowCanvas" width="240" height="320"></canvas>

<!-- Bismillah overlay -->

<!-- Completion banner -->
<div id="jamarComplete">
  <h3>🕋 MashaAllah!</h3>
  <p>You have completed all 21 throws.<br>May Allah accept your Hajj.</p>
  <button onclick="resetJamarat()">Reset &amp; Repeat</button>
</div>

<script>
// ====== JAMARAT STONE THROWING SYSTEM ======
// Panorama IDs that face the Jamarat pillars
const JAMAR_PANORAMAS = {
  // Panorama 1: VID_20260217_121959_00_480 (14-44-20)
  'panorama_92A5C87D_8C55_D2F6_41BD_CABD1E84B587': 'small',
  // Panorama 2: missing area VID_20260217_121557_00_475 (16-31-07)
  'panorama_91BCCD88_8C4C_721C_41D8_71D5CA4654E5': 'medium',
  // Panorama 3: VID_20260217_115635_00_436 (14-35-01)
  'panorama_691B992A_7C54_CF9A_41A0_CFAD0184B4D8': 'large'
};

// State
let jamarState = JSON.parse(sessionStorage.getItem('jamarState') || 'null') || {
  small: 0, medium: 0, large: 0
};
let currentPillar = null;
let throwAnimating = false;

// ── UI refs ──
const throwBtn = document.getElementById('jamarThrowBtn');
const throwLabel = document.getElementById('throwLabel');
const hud = document.getElementById('jamarHUD');
const throwCanvas = document.getElementById('jamarThrowCanvas');
const bismillah = document.getElementById('jamarBismillah');
const completeEl = document.getElementById('jamarComplete');
const tcx = throwCanvas.getContext('2d');

// ── Save state ──
function saveState() {
  sessionStorage.setItem('jamarState', JSON.stringify(jamarState));
}

// ── Update HUD ──
function updateHUD() {
  const total = jamarState.small + jamarState.medium + jamarState.large;
  document.getElementById('hudSmall').textContent = jamarState.small + '/7';
  document.getElementById('hudSmall').className = 'count' + (jamarState.small >= 7 ? ' done' : '');
  document.getElementById('hudMedium').textContent = jamarState.medium + '/7';
  document.getElementById('hudMedium').className = 'count' + (jamarState.medium >= 7 ? ' done' : '');
  document.getElementById('hudLarge').textContent = jamarState.large + '/7';
  document.getElementById('hudLarge').className = 'count' + (jamarState.large >= 7 ? ' done' : '');
  document.getElementById('hudTotal').textContent = total + '/21';

  if (currentPillar && jamarState[currentPillar] < 7) {
    throwLabel.textContent = '(' + (jamarState[currentPillar] + 1) + '/7)';
  }
}

// ── Show/hide overlay based on current panorama ──
function checkPanorama(panoramaId) {
  const pillar = JAMAR_PANORAMAS[panoramaId] || null;
  currentPillar = pillar;
  const total = jamarState.small + jamarState.medium + jamarState.large;

  if (pillar && jamarState[pillar] < 7) {
    throwBtn.style.display = 'flex';
    hud.style.display = 'block';
    throwLabel.textContent = '(' + (jamarState[pillar] + 1) + '/7)';
  } else if (pillar && jamarState[pillar] >= 7) {
    throwBtn.style.display = 'none';
    hud.style.display = 'block';
  } else {
    throwBtn.style.display = 'none';
    hud.style.display = total > 0 ? 'block' : 'none';
  }

  if (total >= 21) {
    throwBtn.style.display = 'none';
    completeEl.style.display = 'block';
  }
}

// ── THROW ANIMATION (simplified from jamarat_hand_throw_v3) ──
const TW = 240, TH = 320, TNF = 36;

function lerp(a, b, t) { return a + (b - a) * t; }
function eio(t) { return t < 0.5 ? 4*t*t*t : 1 - Math.pow(-2*t+2, 3)/2; }

function drawThrowFrame(ctx, f) {
  ctx.clearRect(0, 0, TW, TH);
  const t = f / TNF;

  // Hand position
  let hx, hy, alpha, stoneA, sx, sy;
  if (t < 0.2) {
    const p = eio(t / 0.2);
    hx = TW/2; hy = lerp(TH + 40, TH * 0.7, p);
    alpha = p; stoneA = p;
    sx = hx; sy = hy - 30;
  } else if (t < 0.5) {
    const p = eio((t - 0.2) / 0.3);
    hx = TW/2; hy = lerp(TH * 0.7, TH * 0.55, p);
    alpha = 1; stoneA = 1;
    sx = hx; sy = hy - 30;
  } else if (t < 0.75) {
    const p = eio((t - 0.5) / 0.25);
    hx = TW/2; hy = lerp(TH * 0.55, TH * 0.45, p);
    alpha = 1;
    sx = hx + p * 80; sy = hy - 30 - p * 120;
    stoneA = 1 - p * 0.5;
  } else {
    const p = eio((t - 0.75) / 0.25);
    hx = TW/2; hy = lerp(TH * 0.45, TH * 0.6, p);
    alpha = 1 - p;
    sx = TW + 20; sy = -20;
    stoneA = 0;
  }

  // Draw hand (simplified)
  ctx.save();
  ctx.globalAlpha = alpha;
  ctx.translate(hx, hy);
  // Palm
  ctx.beginPath();
  ctx.ellipse(0, 0, 22, 30, 0, 0, Math.PI * 2);
  ctx.fillStyle = '#B8BCC8';
  ctx.fill();
  ctx.strokeStyle = '#6A6E7A';
  ctx.lineWidth = 1.5;
  ctx.stroke();
  // Fingers
  for (let i = -2; i <= 1; i++) {
    ctx.beginPath();
    ctx.roundRect(i * 11 - 4, -28, 9, 20, 4);
    ctx.fillStyle = '#B8BCC8';
    ctx.fill();
    ctx.stroke();
  }
  ctx.restore();

  // Draw stone
  if (stoneA > 0) {
    ctx.save();
    ctx.globalAlpha = stoneA;
    ctx.translate(sx, sy);
    ctx.rotate(t * Math.PI * 6);
    ctx.beginPath();
    ctx.ellipse(0, 0, 10, 8, 0.2, 0, Math.PI * 2);
    ctx.fillStyle = '#909298';
    ctx.fill();
    ctx.strokeStyle = '#C4C8D2';
    ctx.lineWidth = 1;
    ctx.stroke();
    // Highlight
    ctx.beginPath();
    ctx.ellipse(-3, -2, 3, 2, -0.3, 0, Math.PI * 2);
    ctx.fillStyle = 'rgba(255,255,255,0.5)';
    ctx.fill();
    ctx.restore();
  }
}

function playThrowAnimation(callback) {
  throwCanvas.style.display = 'block';
  let frame = 0;
  function animate() {
    drawThrowFrame(tcx, frame);
    frame++;
    if (frame < TNF) {
      requestAnimationFrame(animate);
    } else {
      throwCanvas.style.display = 'none';
      if (callback) callback();
    }
  }
  animate();
}

// ── THROW ACTION ──
function throwStone() {
  if (!currentPillar || throwAnimating) return;
  if (jamarState[currentPillar] >= 7) return;
  throwAnimating = true;

  // Show Bismillah
  bismillah.style.display = 'block';
  bismillah.style.opacity = '1';

  // Play animation
  setTimeout(function() {
    bismillah.style.opacity = '0';
    setTimeout(function() { bismillah.style.display = 'none'; }, 300);

    playThrowAnimation(function() {
      // Count the throw
      jamarState[currentPillar]++;
      saveState();
      updateHUD();
      throwAnimating = false;

      const total = jamarState.small + jamarState.medium + jamarState.large;

      // Pillar complete?
      if (jamarState[currentPillar] >= 7) {
        throwBtn.style.display = 'none';
        if (total >= 21) {
          completeEl.style.display = 'block';
        }
      }
    });
  }, 800);
}

// ── RESET ──
function resetJamarat() {
  jamarState = { small: 0, medium: 0, large: 0 };
  saveState();
  updateHUD();
  completeEl.style.display = 'none';
  if (currentPillar) {
    throwBtn.style.display = 'flex';
    throwLabel.textContent = '(1/7)';
  }
}

// ── PANORAMA CHANGE DETECTION ──
let lastPanoId = '';
const PANO_RE = /(panorama_[A-F0-9]+_[A-F0-9]+_[A-F0-9]+_[A-F0-9]+_[A-F0-9]+)_0\//i;

function detectPano(url) {
  if (typeof url !== 'string') return;
  const m = url.match(PANO_RE);
  if (m && m[1] !== lastPanoId) {
    lastPanoId = m[1];
    // Check if it's a Jamarat panorama OR clear button if not
    checkPanorama(m[1]);
  }
}

// 1. PerformanceObserver — catches ALL resource loads (img, fetch, xhr, css)
try {
  const po = new PerformanceObserver(function(list) {
    const entries = list.getEntries();
    for (let i = 0; i < entries.length; i++) {
      detectPano(entries[i].name);
    }
  });
  po.observe({ type: 'resource', buffered: false });
} catch(e) {}

// 2. Intercept Image constructor (3DVista loads tiles via new Image())
const OrigImage = window.Image;
window.Image = function(w, h) {
  const img = new OrigImage(w, h);
  const origSet = Object.getOwnPropertyDescriptor(HTMLImageElement.prototype, 'src').set;
  Object.defineProperty(img, 'src', {
    set: function(v) { detectPano(v); origSet.call(this, v); },
    get: function() { return Object.getOwnPropertyDescriptor(HTMLImageElement.prototype, 'src').get.call(this); }
  });
  return img;
};
window.Image.prototype = OrigImage.prototype;

// 3. Patch TDV playlist navigation (most direct detection)
function hookTDV() {
  if (typeof TDV === 'undefined' || !TDV.Tour || !TDV.Tour.Script) {
    return setTimeout(hookTDV, 500);
  }
  const origSetPLI = TDV.Tour.Script.setPlayListSelectedIndex;
  if (origSetPLI) {
    TDV.Tour.Script.setPlayListSelectedIndex = function(a, b) {
      try {
        const item = a.get('items')[b];
        const media = item.get('media');
        const id = media.get('id');
        if (id !== lastPanoId) {
          lastPanoId = id;
          checkPanorama(id);
        }
      } catch(e) {}
      return origSetPLI.apply(this, arguments);
    };
  }
  const origSetMMI = TDV.Tour.Script.setMainMediaByIndex;
  if (origSetMMI) {
    TDV.Tour.Script.setMainMediaByIndex = function(a) {
      try {
        const items = this.mainPlayList.get('items');
        if (a >= 0 && a < items.length) {
          const id = items[a].get('media').get('id');
          if (id !== lastPanoId) {
            lastPanoId = id;
            checkPanorama(id);
          }
        }
      } catch(e) {}
      return origSetMMI.apply(this, arguments);
    };
  }
  console.log('[Jamarat] TDV hooks installed');
}
hookTDV();

// Init
updateHUD();
</script>
</body>
