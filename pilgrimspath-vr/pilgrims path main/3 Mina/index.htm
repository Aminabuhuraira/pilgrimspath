<script>
var _bannerPager={title:'',pages:[],index:0};
function _splitBannerHtml(html){var segs=html.match(/<h3[\s\S]*?<\/h3>|<p[\s\S]*?<\/p>|<div class="sep"><\/div>|<br\s*\/?\s*>/gi)||[html];var pages=[];var cur=[];var chars=0;for(var i=0;i<segs.length;i++){var s=segs[i];var txt=s.replace(/<[^>]+>/g,' ').replace(/\s+/g,' ').trim();var len=txt.length;if(cur.length&&(chars+len>620||cur.length>=6)){pages.push(cur.join(''));cur=[];chars=0;}cur.push(s);chars+=len;}if(cur.length)pages.push(cur.join(''));return pages.length?pages:[html];}
function _renderBannerPage(){var el=document.getElementById('sceneBanner');if(!el)return;var isLast=_bannerPager.index>=_bannerPager.pages.length-1;var btn=isLast?'Continue \u25b8':'Next \u25b8';el.innerHTML='<div class="sceneBannerBody"><h3>'+_bannerPager.title+'</h3>'+_bannerPager.pages[_bannerPager.index]+'<button onclick="dismissBanner()">'+btn+'</button></div>';el.style.display='block';}
function openBanner(title,html){_bannerPager.title=title;_bannerPager.pages=_splitBannerHtml(html);_bannerPager.index=0;_renderBannerPage();}
function dismissBanner(){if(_bannerPager.pages.length&&_bannerPager.index<_bannerPager.pages.length-1){_bannerPager.index++;_renderBannerPage();return;}_bannerPager={title:'',pages:[],index:0};document.getElementById('sceneBanner').style.display='none';}
function playVO(f){
    if(!f) return;
    if(window._voCurrentFile===f && window._voAudio && !window._voAudio.paused && !window._voAudio.ended) return;
    window._voCurrentFile = f;
    if(window._voAudio){ try{ window._voAudio.pause(); }catch(e){} window._voAudio=null; }
    if(window._voChainPending && window._voChainPending !== f) window._voChainPending = null;
    window._voPending = f;
    var url = (window.PPContent && window.PPContent.audioUrl)
        ? window.PPContent.audioUrl(f)
        : ('/Hajj%20Voice%20Over/' + encodeURIComponent(f));
    var a = new Audio(url);
    window._voAudio = a;
    a.addEventListener('ended', function(){ if(window._voPending===f) window._voPending=null; });
    a.addEventListener('error', function(){ console.warn('[VO] failed to load', f); });
    var p = a.play();
    if(p && p.catch){
        p.catch(function(err){
            console.warn('[VO] autoplay blocked, will play on first user interaction', err && err.name);
            _showVoHint();
            if(window._voUnlockBound) return;
            window._voUnlockBound = true;
            var unlock = function(){
                document.removeEventListener('click', unlock, true);
                document.removeEventListener('touchend', unlock, true);
                document.removeEventListener('keydown', unlock, true);
                document.removeEventListener('pointerdown', unlock, true);
                window._voUnlockBound = false;
                _hideVoHint();
                var pending = window._voPending;
                if(pending) playVO(pending);
            };
            document.addEventListener('click', unlock, true);
            document.addEventListener('touchend', unlock, true);
            document.addEventListener('keydown', unlock, true);
            document.addEventListener('pointerdown', unlock, true);
        });
    }
}
function _showVoHint(){ return; return;
    if(document.getElementById('voHint')) return;
    var h = document.createElement('div');
    h.id = 'voHint';
    h.textContent = '\uD83D\uDD0A Tap anywhere to start narration';
    h.style.cssText = 'position:fixed;top:18px;left:50%;transform:translateX(-50%);z-index:99999;'
      + 'background:linear-gradient(135deg,#D4AF37,#C9A227);color:#fff;padding:9px 18px;border-radius:999px;'
      + 'font-family:Poppins,sans-serif;font-size:0.78rem;font-weight:600;letter-spacing:.3px;'
      + 'box-shadow:0 6px 20px rgba(201,162,39,0.5);cursor:pointer;'
      + 'animation:voHintPulse 1.6s ease-in-out infinite;pointer-events:none;';
    if(!document.getElementById('voHintStyles')){
        var st = document.createElement('style'); st.id='voHintStyles';
        st.textContent = '@keyframes voHintPulse{0%,100%{box-shadow:0 6px 20px rgba(201,162,39,0.45)}50%{box-shadow:0 6px 28px rgba(201,162,39,0.85)}}';
        document.head.appendChild(st);
    }
    document.body.appendChild(h);
}
function _hideVoHint(){ var h = document.getElementById('voHint'); if(h) h.remove(); }
(function(){
var journeyContext = new URL(window.location).searchParams.get('context') || '8th-day';

// -- Map context ? JCM scene key ------------------------------------------
var _sceneKey = journeyContext === 'tents-11th' ? 'mina-tents-11'
              : journeyContext === 'tents-12th' ? 'mina-tents-12'
              : journeyContext === 'tents-13th' ? 'mina-tents-13'
              :                                  'mina-8th';

// -- Read banner + VO data from JCM (single source of truth) --------------
var _bannerMap = {};
var _audioMap  = {};
if (window.PPContent && window.PPContent.hasData) {
  _bannerMap = window.PPContent.bannerMapByPano(_sceneKey) || {};
  _audioMap  = window.PPContent.audioMapByPano(_sceneKey)  || {};
}

var TENT_PANO = 'panorama_72AD4A6A_7C54_4D9A_41DC_AA69EFBD3C52';
var IS_TENT_MODE = (journeyContext === 'tents-11th' || journeyContext === 'tents-12th' || journeyContext === 'tents-13th');
var shown = {}, lastId = '';
var _landingShown = {};   // tracks whether the landing prompt has fired per pano

// Panorama that should show the "Explore vs Next Scene" landing prompt
var MINA_LANDING_8TH  = 'panorama_73D8B866_7C54_4D8A_41D3_BF331164945C';
var MINA_LANDING_PANOS = {};
// NOTE: MINA_LANDING_8TH is the entry panorama ? no prompt on arrival, only on TENT_PANO
MINA_LANDING_PANOS[TENT_PANO] = { icon: '\u26FA', title: 'Mina \u2014 Days of Tashreeq', subtitle: 'The nights of Tashreeq are spent here in remembrance of Allah. Explore \u2014 or continue to the next rite.' };

function _minaFireBannerVO(id) {
  var b  = _bannerMap[id];
  var vo = _audioMap[id];
  if (!b && !vo) return;
  shown[id] = true;
  if (b && (b.title || b.html)) openBanner(b.title, b.html);
  if (vo) playVO(vo);
  if (id === MINA_LANDING_8TH) {
    window.journeyIsLastPanorama = true;
    if (typeof showJourneyNextButton === 'function') { setTimeout(showJourneyNextButton, 300); }
  }
}

function _minaProceed(id) {
  shown[id] = true;
  if (IS_TENT_MODE) {
    var btn = document.getElementById('minaContinue');
    if (btn) { btn.style.display = 'inline-flex'; btn.click(); return; }
  }
  window.journeyIsLastPanorama = true;
  if (typeof window.proceedWithQuiz === 'function') {
    window.proceedWithQuiz(function () {
      if (window.jm && typeof window.jm.goToNext === 'function') window.jm.goToNext();
    });
  } else if (window.jm && typeof window.jm.goToNext === 'function') {
    window.jm.goToNext();
  }
}

function chk(id) {
  if (shown[id]) return;

  // Show landing prompt first for the designated panoramas
  var lpCfg = MINA_LANDING_PANOS[id];
  if (lpCfg && !_landingShown[id] && typeof window.ppShowLandingPrompt === 'function') {
    _landingShown[id] = true;
    window.ppShowLandingPrompt({
      icon: lpCfg.icon,
      title: lpCfg.title,
      subtitle: lpCfg.subtitle,
      onExplore: function () { _minaFireBannerVO(id); },
      onProceed: function () { _minaProceed(id); }
    });
    return;
  }

  // Normal panorama (no landing prompt): fire banner/VO if configured
  var b  = _bannerMap[id];
  var vo = _audioMap[id];
  if (!b && !vo) return;
  shown[id] = true;
  if (b && (b.title || b.html)) openBanner(b.title, b.html);
  if (vo) playVO(vo);
  // 8th-day end panorama: surface the Next-Stop button
  if (id === MINA_LANDING_8TH) {
    window.journeyIsLastPanorama = true;
    if (typeof showJourneyNextButton === 'function') { setTimeout(showJourneyNextButton, 300); }
  }
}

function _showMinaDoneBtn(){
  if(document.getElementById('minaDoneBtn')) return;
  var b=document.createElement('button');
  b.id='minaDoneBtn';
  b.innerHTML='\u2713 I\u2019m done exploring \u25b8';
  b.style.cssText='position:fixed;left:50%;bottom:96px;transform:translateX(-50%);z-index:10005;'
    +'background:linear-gradient(135deg,#C9A84C,#8B6914);color:#fff;border:none;border-radius:999px;'
    +'padding:11px 24px;font-size:13px;font-weight:700;letter-spacing:.3px;'
    +'font-family:Poppins,\'DM Sans\',Arial,sans-serif;cursor:pointer;'

  b.onmouseover=function(){b.style.transform='translateX(-50%) scale(1.05)';};
  b.onmouseout=function(){b.style.transform='translateX(-50%) scale(1)';};
  b.onclick=_showMinaEndModal;
  document.body.appendChild(b);
}
function _showMinaEndModal(){
  var prev=document.getElementById('minaEndModal'); if(prev) prev.remove();
  var bd=document.createElement('div'); bd.id='minaEndBackdrop';
  bd.style.cssText='position:fixed;inset:0;z-index:10006;background:rgba(0,0,0,.55);backdrop-filter:blur(4px);';
  var m=document.createElement('div'); m.id='minaEndModal';
  m.style.cssText='position:fixed;left:50%;top:50%;transform:translate(-50%,-50%);z-index:10007;'
    +'background:linear-gradient(180deg,#FFF8E7 0%,#F5E9C8 100%);color:#3D2B1F;'
    +'border:2px solid #C9A84C;border-radius:18px;padding:28px 32px;max-width:440px;width:92vw;'
    +'font-family:Poppins,\'DM Sans\',Arial,sans-serif;text-align:center;'
    +'box-shadow:0 24px 60px rgba(0,0,0,.45);';
  m.innerHTML=
    '<h3 style="color:#8B6914;margin:0 0 10px;font-size:22px;">Day at Mina complete</h3>'
    +'<p style="color:#3D2B1F;font-size:14px;line-height:1.45;margin:0 0 20px;">'
    +'You may now continue to the next scene, keep exploring Mina, or restart from the beginning.</p>'
    +'<div style="display:flex;flex-direction:column;gap:10px;">'
    +'<button id="mnEndContinue" style="background:linear-gradient(135deg,#C9A84C,#8B6914);color:#fff;border:none;border-radius:999px;padding:12px 22px;font-size:14px;font-weight:700;cursor:pointer;">Continue to Next Scene \u25b8</button>'
    +'<button id="mnEndExplore" style="background:transparent;color:#8B6914;border:1.5px solid #C9A84C;border-radius:999px;padding:11px 22px;font-size:13px;font-weight:600;cursor:pointer;">Keep Exploring</button>'
    +'<button id="mnEndRestart" style="background:transparent;color:#6B5B4F;border:1px solid rgba(107,91,79,.4);border-radius:999px;padding:10px 22px;font-size:12px;font-weight:600;cursor:pointer;">\u21bb Restart Scene</button>'
    +'</div>';
  document.body.appendChild(bd); document.body.appendChild(m);
  function close(){ try{bd.remove();m.remove();}catch(_){}}
  document.getElementById('mnEndExplore').onclick=close;
  document.getElementById('mnEndRestart').onclick=function(){ location.reload(); };
  document.getElementById('mnEndContinue').onclick=function(){
    close();
    if(typeof showJourneyNextButton==='function'){ showJourneyNextButton(); }
  };
}
// PerformanceObserver + Image.src hijack removed ? fires on adjacent-pano
// preloads causing banners/VOs to play before user actually navigates there.
// TDV hook below is the only trigger.
function hookTDV(){if(typeof TDV==='undefined'||!TDV.Tour||!TDV.Tour.Script)return setTimeout(hookTDV,500);var o1=TDV.Tour.Script.setPlayListSelectedIndex;if(o1){TDV.Tour.Script.setPlayListSelectedIndex=function(a,b){try{var id=a.get('items')[b].get('media').get('id');if(id!==lastId){lastId=id;chk(id);}}catch(e){}return o1.apply(this,arguments);};}var o2=TDV.Tour.Script.setMainMediaByIndex;if(o2){TDV.Tour.Script.setMainMediaByIndex=function(a){try{var items=this.mainPlayList.get('items');if(a>=0&&a<items.length){var id=items[a].get('media').get('id');if(id!==lastId){lastId=id;chk(id);}}}catch(e){}return o2.apply(this,arguments);};}console.log('[Mina] banner hooks installed (ctx='+journeyContext+')');}
hookTDV();
// Force-jump to tent panorama in tent modes; otherwise just trigger first banner
if(IS_TENT_MODE){
  function jumpToTent(retries){retries=retries||0;try{var t=TDV.PlayerAPI.getCurrentPlayer();var pl=t&&t.mainPlayList;if(!pl){if(retries<40)return setTimeout(function(){jumpToTent(retries+1);},250);return;}var items=pl.get('items');for(var i=0;i<items.length;i++){if(items[i].get('media').get('id')===TENT_PANO){if(pl.get('selectedIndex')!==i)pl.set('selectedIndex',i);return;}}}catch(e){if(retries<40)setTimeout(function(){jumpToTent(retries+1);},250);}}
  setTimeout(jumpToTent,1500);
  setTimeout(function(){chk(TENT_PANO);},2500);
} else {
  setTimeout(function(){var k=Object.keys(_bannerMap);if(k.length)chk(k[0]);},2500);
}
})();
