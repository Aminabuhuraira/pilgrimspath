function playVO(f){
    if(!f) return;
    if(window._voCurrentFile===f && window._voAudio && !window._voAudio.paused && !window._voAudio.ended) return;
    window._voCurrentFile = f;
    if(window._voAudio){ try{ window._voAudio.pause(); }catch(e){} window._voAudio=null; }
    // Also cancel JCL's scene-load fallback audio so it doesn't overlap.
    if(window._ppFallbackVO){ try{ window._ppFallbackVO.pause(); }catch(e){} window._ppFallbackVO=null; }
    // Mark scene-load audio as handled so _fetchServerContent doesn't replay.
    window._ppSceneLoadAudioPlayed = true;
    window._ppSceneLoadFired = true;
    if(window._voChainPending && window._voChainPending !== f) window._voChainPending = null;
    window._voPending = f;
    var url = (window.PPContent && window.PPContent.audioUrl)
        ? window.PPContent.audioUrl(f)
        : ('/Hajj%20Voice%20Over/' + encodeURIComponent(f));
    var a = new Audio(url);
    window._voAudio = a;
    a.addEventListener('ended', function(){ if(window._voPending===f) window._voPending=null; });
    a.addEventListener('error', function(){ console.warn('[VO] failed to load', f); });
    var p = a.play();
    if(p && p.catch){
        p.catch(function(err){
            console.warn('[VO] autoplay blocked, will play on first user interaction', err && err.name);
            _showVoHint();
            if(window._voUnlockBound) return;
            window._voUnlockBound = true;
            var unlock = function(){
                document.removeEventListener('click', unlock, true);
                document.removeEventListener('touchend', unlock, true);
                document.removeEventListener('keydown', unlock, true);
                document.removeEventListener('pointerdown', unlock, true);
                window._voUnlockBound = false;
                _hideVoHint();
                var pending = window._voPending;
                if(pending) playVO(pending);
            };
            document.addEventListener('click', unlock, true);
            document.addEventListener('touchend', unlock, true);
            document.addEventListener('keydown', unlock, true);
            document.addEventListener('pointerdown', unlock, true);
        });
    }
}

(function(){
// -- Read sequential banner content from JCM (single source of truth) ------
var _arafahSeq = (window.PPContent && window.PPContent.hasData)
  ? (window.PPContent.bySequence('arafah-9th') || [])

// -- Panorama-triggered banners (e.g. ar-pano-congrats for 84B7F067) --------

  ? (window.PPContent.bannerMapByPano('arafah-9th') || {})

  ? (window.PPContent.audioMapByPano('arafah-9th')  || {})

// the admin later changes ar-seq-1 to a scene-load trigger on the server.
if(_arafahSeq.length && _arafahSeq[0].audio){
  // Mark audio as started so _fetchServerContent's else-if branch doesn't replay.
  // NOTE: _ppSceneLoadFired is intentionally NOT set here — fireSceneLoad() in
  // _fetchServerContent must remain able to run so the correct server scene-load

  // added by admin Re-sync from DEFAULT_DATA that the server doesn't have).
  window._ppSceneLoadAudioPlayed = true;
  window._welcomeVoStarted = true;

// If no sequence banners (admin changed ar-seq-1 to scene-load trigger), fireSceneLoad

// so the journey continues correctly when the user dismisses the intro.
if(!_arafahSeq.length && window.PPContent && window.PPContent.hasData){
  window.__ppSceneBannerAfterClose = function(){ _showArafahEndModal(); };
}
function _showArafahIntro(){
  // Refresh _arafahSeq from latest PPContent — if server data has already arrived
  // (overriding stale LOCAL banners added by admin Re-sync), this prevents the
  // wrong banner (e.g. ar-seq-2 'Travelling to Muzdalifah') from ever showing.
  if(window.PPContent && window.PPContent.hasData){
    _arafahSeq = window.PPContent.bySequence('arafah-9th') || [];
  }
  var s=_arafahSeq[0];
  if(!s){
    // No sequence banners: scene-load banner is handled by fireSceneLoad.
    // Ensure _showArafahDoneBtn is hooked in case this fires before the init block above.
    if(!window.__ppSceneBannerAfterClose)
      window.__ppSceneBannerAfterClose = function(){ _showArafahEndModal(); };
    return;
  }
  // Block JCL's fireSceneLoad / ppPlayVOAuto from double-firing after async
  // server fetch resolves. Without this, when LOCAL has a stale sequence-1
  // banner AND server has the same audio re-tagged as scene-load, both fire.
  window._ppSceneLoadFired = true;
  window._ppSceneLoadAudioPlayed = true;
  window._welcomeVoStarted = true;
  openBanner(s.title,s.html,s.template,s.position);
  playVO(s.audio);
  setTimeout(function(){
    var el=document.getElementById('sceneBanner');if(!el)return;
    var btn=el.querySelector('button');if(!btn)return;

      _bannerPager.index=_bannerPager.pages.length;dismissBanner();
      _showArafahEndModal();

}

    +'You may now continue to Muzdalifah, keep exploring this scene, or restart from the beginning.</p>'
    +'<div style="display:flex;flex-direction:column;gap:10px;">'
    +'<button id="arEndContinue" style="background:linear-gradient(135deg,#C9A84C,#8B6914);color:#fff;border:none;border-radius:999px;padding:12px 22px;font-size:14px;font-weight:700;cursor:pointer;">Continue to Muzdalifah \u25b8</button>'

    +'<button id="arEndRestart" style="background:transparent;color:#6B5B4F;border:1px solid rgba(107,91,79,.4);border-radius:999px;padding:10px 22px;font-size:12px;font-weight:600;cursor:pointer;">\u21bb Restart Scene</button>'

function _playRemainingArafahNarration(idx){
  if(idx>=_arafahSeq.length){
    window.journeyIsLastPanorama=true;
    if(typeof showJourneyNextButton==='function'){ setTimeout(showJourneyNextButton,300); }

  }

  openBanner(s.title,s.html,s.template,s.position);
  playVO(s.audio);

    var el=document.getElementById('sceneBanner');if(!el)return;

var shown = {}, lastId = '';
function chk(id) {

  if (id.indexOf('84B0CD28') !== -1 && !shown[id]) {
    shown[id] = true;
    _showArafahIntro();
    return;
  }
  // Target panorama (84B78C66 ? 15-09-02 screenshot): show the landing prompt
  if (id.indexOf('84B78C66') !== -1 && !shown[id]) {
    shown[id] = true;
    if (typeof window.ppShowLandingPrompt === 'function') {
      window.ppShowLandingPrompt({
        icon: '⛰',
        title: 'The Plains of Arafah',
        subtitle: 'You stand at the most sacred station of Hajj. Continue exploring ? or move on with your pilgrimage.',
        onExplore: function () { /* user stays and explores ? nothing else to fire */ },
        onProceed: function () {
          window.journeyIsLastPanorama = true;
          if (typeof window.proceedWithQuiz === 'function') {
            window.proceedWithQuiz(function () {
              if (window.jm && typeof window.jm.goToNext === 'function') window.jm.goToNext();
            });
          } else if (window.jm && typeof window.jm.goToNext === 'function') {
            window.jm.goToNext();
          }
        }
      });
    } else {
      // fallback: directly navigate
      window.journeyIsLastPanorama = true;
      if (typeof window.proceedWithQuiz === 'function') {
        window.proceedWithQuiz(function () {
          if (window.jm && typeof window.jm.goToNext === 'function') window.jm.goToNext();
        });
      }
    }
  }
  // Congrats panorama (84B7F067): show CMS banner if configured, surface Next Stop
  if (id.indexOf('84B7F067') !== -1 && !shown[id]) {
    shown[id] = true;
    var _b = _bannerMap[id];
    var _vo = _audioMap[id];
    if (_b && (_b.title || _b.html)) {
      openBanner(_b.title, _b.html, _b.template, _b.position);
      if (_vo) playVO(_vo);
    } else if (_vo) {
      playVO(_vo);
    }
    window.journeyIsLastPanorama = true;
    if (typeof showJourneyNextButton === 'function') { setTimeout(showJourneyNextButton, 300); }
  }
}
function hookTDV(){if(typeof TDV==='undefined'||!TDV.Tour||!TDV.Tour.Script)return setTimeout(hookTDV,500);var o1=TDV.Tour.Script.setPlayListSelectedIndex;if(o1){TDV.Tour.Script.setPlayListSelectedIndex=function(a,b){try{var id=a.get('items')[b].get('media').get('id');if(id!==lastId){lastId=id;chk(id);}}catch(e){}return o1.apply(this,arguments);};}var o2=TDV.Tour.Script.setMainMediaByIndex;if(o2){TDV.Tour.Script.setMainMediaByIndex=function(a){try{var items=this.mainPlayList.get('items');if(a>=0&&a<items.length){var id=items[a].get('media').get('id');if(id!==lastId){lastId=id;chk(id);}}}catch(e){}return o2.apply(this,arguments);};}console.log('[Arafah] banner hooks installed');}
hookTDV();
// Rebuild _arafahSeq when server data arrives and ensure __ppSceneBannerAfterClose
// is wired to _showArafahDoneBtn so fireSceneLoad's JCL banner can chain correctly
// even when LOCAL data had stale sequence banners from an admin Re-sync.
(function(){
  var _prevAR = window._ppGuideContentRefresh;
  window._ppGuideContentRefresh = function(){
    if(typeof _prevAR === 'function') _prevAR();
    if(window.PPContent && window.PPContent.hasData){
      _arafahSeq = window.PPContent.bySequence('arafah-9th') || [];
      _bannerMap = window.PPContent.bannerMapByPano('arafah-9th') || {};
      _audioMap  = window.PPContent.audioMapByPano('arafah-9th')  || {};
      // If server has no sequence banners, ensure fireSceneLoad's 'Continue' button
      // chains into _showArafahDoneBtn via __ppSceneBannerAfterClose.
      if(!_arafahSeq.length && !window.__ppSceneBannerAfterClose){
        window.__ppSceneBannerAfterClose = function(){ _showArafahEndModal(); };
      }
    }
  };
})();
// Force-jump to the entry panorama (84B0CD28). The TDV tour may default to a
// different panorama (e.g. the summit 84B78C66) which would cause the
// summit "Continue or Explore" landing prompt to appear on scene load.
var ARAFAH_ENTRY = 'panorama_84B0CD28_8BC4_4A0E_4196_9526145973A3';
function _arafahJumpEntry(retries){
  retries = retries || 0;
  try{
    var t = TDV.PlayerAPI.getCurrentPlayer();
    var pl = t && t.mainPlayList;
    if(!pl){ if(retries<40) return setTimeout(function(){_arafahJumpEntry(retries+1);}, 250); return; }
    var items = pl.get('items');
    for(var i=0; i<items.length; i++){
      if(items[i].get('media').get('id') === ARAFAH_ENTRY){
        if(pl.get('selectedIndex') !== i) pl.set('selectedIndex', i);
        return;
      }
    }
  }catch(e){ if(retries<40) setTimeout(function(){_arafahJumpEntry(retries+1);}, 250); }
}
setTimeout(_arafahJumpEntry, 800);
// Fire the Arafah intro on the entry panorama after a short delay
// (fallback in case the TDV hook doesn't fire on initial load)
setTimeout(function(){
  if (!shown[ARAFAH_ENTRY]) {
    shown[ARAFAH_ENTRY] = true;
    _showArafahIntro();
  }
}, 2500);
})();
</script>
