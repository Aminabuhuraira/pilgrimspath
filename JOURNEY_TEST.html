<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8"/>
  <meta name="viewport" content="width=device-width, initial-scale=1.0"/>
  <title>Pilgrim's Path — Start Your Journey</title>
  <link href="https://fonts.googleapis.com/css2?family=Poppins:wght@300;400;600;700&family=Amiri:wght@400;700&display=swap" rel="stylesheet"/>
  <style>
    *,*::before,*::after{box-sizing:border-box;margin:0;padding:0}
    html,body{height:100%;font-family:'Poppins',sans-serif;background:#0d1b2a;overflow:hidden}
    body{display:flex;flex-direction:column;align-items:center;justify-content:center;min-height:100vh;padding:20px;}
    .stars{position:fixed;inset:0;pointer-events:none;}
    .star{position:absolute;width:2px;height:2px;background:#fff;border-radius:50%;animation:twinkle 3s ease-in-out infinite;}
    @keyframes twinkle{0%,100%{opacity:0.2}50%{opacity:0.9}}
    .card{position:relative;z-index:2;background:rgba(255,255,255,0.97);border-radius:28px;padding:44px 40px 36px;max-width:640px;width:100%;text-align:center;box-shadow:0 24px 80px rgba(0,0,0,0.5);border:1.5px solid rgba(212,175,55,0.3);}
    .kaaba{font-size:3.5rem;margin-bottom:8px;}
    .label{font-size:0.68rem;text-transform:uppercase;letter-spacing:3px;color:#B8941F;font-weight:600;margin-bottom:6px;}
    h1{font-size:1.9rem;font-weight:700;color:#1a1a2e;margin-bottom:4px;}
    .subtitle{color:#6B5B4F;font-size:0.95rem;margin-bottom:28px;line-height:1.6;}
    .divider{width:60px;height:2px;margin:0 auto 28px;background:linear-gradient(90deg,transparent,#D4AF37,transparent);}
    .btn-start{display:inline-flex;align-items:center;gap:12px;padding:16px 40px;border-radius:50px;border:none;background:linear-gradient(135deg,#D4AF37,#C9A227,#B8941F);color:#fff;font-family:'Poppins',sans-serif;font-size:1.05rem;font-weight:700;cursor:pointer;box-shadow:0 8px 30px rgba(201,162,39,0.55);transition:transform .15s,box-shadow .15s;text-decoration:none;margin-bottom:18px;width:100%;justify-content:center;}
    .btn-start:hover{transform:translateY(-2px) scale(1.02);box-shadow:0 12px 40px rgba(201,162,39,0.7);}
    .steps-grid{display:grid;grid-template-columns:1fr 1fr;gap:8px;margin-top:20px;}
    .step-link{display:flex;align-items:center;gap:8px;padding:9px 14px;border-radius:12px;background:rgba(248,243,230,0.7);border:1px solid rgba(212,175,55,0.18);text-decoration:none;color:#3D2B1F;font-size:0.82rem;font-weight:500;transition:background .12s;}
    .step-link:hover{background:rgba(212,175,55,0.15);}
    .step-num{font-size:0.7rem;font-weight:700;color:#B8941F;min-width:18px;}
    .reset-btn{margin-top:18px;color:#999;font-size:0.78rem;background:none;border:none;cursor:pointer;text-decoration:underline;}
    .reset-btn:hover{color:#c62828;}
  </style>
</head>
<body>
  <div class="stars" id="stars"></div>
  <div class="card">
    <div class="kaaba">🕋</div>
    <div class="label">Virtual Hajj Experience</div>
    <h1>Pilgrim's Path</h1>
    <p class="subtitle">An immersive 16-step journey through the sacred rites of Hajj</p>
    <div class="divider"></div>

    <a class="btn-start" href="/pilgrimspath-vr/pilgrims%20path%20main/1%20Tawaf/index.htm?journey=1&context=initial">
      🕊️ Begin Your Hajj Journey
    </a>

    <div class="steps-grid" id="stepsGrid"></div>

    <button class="reset-btn" onclick="localStorage.removeItem('journeyState');location.reload()">↺ Reset journey progress</button>
  </div>

  <script>
  // Stars
  (function(){
    var sf=document.getElementById('stars');
    for(var i=0;i<60;i++){
      var s=document.createElement('div');s.className='star';
      s.style.left=Math.random()*100+'%';s.style.top=Math.random()*100+'%';
      s.style.animationDelay=(Math.random()*4)+'s';sf.appendChild(s);
    }
  })();

  // Build step quick-links from journey-manager
  var STEPS = [
    {n:1,  icon:'�', name:'Tawaf × 7',                  url:'/pilgrimspath-vr/pilgrims%20path%20main/1%20Tawaf/index.htm?journey=1&context=initial'},
    {n:2,  icon:'🚶', name:"Sa'i — Safa & Marwa",         url:'/pilgrimspath-vr/pilgrims%20path%20main/2%20Safa%20and%20Marwa/index.htm?journey=2&context=sa-i'},
    {n:3,  icon:'✂️', name:'Clip/Shave Hair (Umrah)',     url:'/pilgrimspath-vr/pilgrims%20path%20main/5%20Rami%20Jamarat%2C%20Qurbani%2C%20trim%20Shave%2C%20Tawaf/barber-scene.html?journey=3&context=umrah-trim'},
    {n:4,  icon:'🌙', name:'Resting & Praying',           url:'/pilgrimspath-vr/pilgrims%20path%20main/0%20Ihram/rest-scene.html?journey=4'},
    {n:5,  icon:'🤲', name:'Re-enter State of Ihram',     url:'/pilgrimspath-vr/pilgrims%20path%20main/0%20Ihram/ihram-scene.html?journey=5&context=re-enter'},
    {n:6,  icon:'⛺', name:'Arrive at Mina (8th Day)',    url:'/pilgrimspath-vr/pilgrims%20path%20main/3%20Mina/index.htm?journey=6&context=8th-day'},
    {n:7,  icon:'🌄', name:'Day of Arafah',               url:'/pilgrimspath-vr/pilgrims%20path%20main/4%20Arafah/index.htm?journey=7&context=9th-day'},
    {n:8,  icon:'⭐', name:'Muzdalifah',                  url:'/pilgrimspath-vr/pilgrims%20path%20main/Muzdalifah/index.htm?journey=8&context=pebbles'},
    {n:9,  icon:'🪨', name:'Rami al-Aqabah (10th Day)',  url:'/pilgrimspath-vr/pilgrims%20path%20main/5%20Rami%20Jamarat%2C%20Qurbani%2C%20trim%20Shave%2C%20Tawaf/Jamarat%20rooftop/index.htm?journey=9&context=10th-day'},
    {n:10, icon:'🐑', name:'Qurbani (Sacrifice)',         url:'/pilgrimspath-vr/pilgrims%20path%20main/5%20Rami%20Jamarat%2C%20Qurbani%2C%20trim%20Shave%2C%20Tawaf/qurbani-scene.html?journey=10&context=sacrifice'},
    {n:11, icon:'✂️', name:'Shave Head (Halaq)',          url:'/pilgrimspath-vr/pilgrims%20path%20main/5%20Rami%20Jamarat%2C%20Qurbani%2C%20trim%20Shave%2C%20Tawaf/barber-scene.html?journey=11&context=barber'},
    {n:12, icon:'🕋', name:'Tawaf al-Ifadha',             url:'/pilgrimspath-vr/pilgrims%20path%20main/1%20Tawaf/index.htm?journey=12&context=ifadha'},
    {n:13, icon:'🪨', name:'Rami — All Pillars (11th)',  url:'/pilgrimspath-vr/pilgrims%20path%20main/5%20Rami%20Jamarat%2C%20Qurbani%2C%20trim%20Shave%2C%20Tawaf/Jamarat%20rooftop/index.htm?journey=13&context=11th-day'},
    {n:14, icon:'⛺', name:'Spend Night at Mina',         url:'/pilgrimspath-vr/pilgrims%20path%20main/3%20Mina/index.htm?journey=14&context=tents-12th'},
    {n:15, icon:'🪨', name:'Rami — All Pillars (12th)',  url:'/pilgrimspath-vr/pilgrims%20path%20main/5%20Rami%20Jamarat%2C%20Qurbani%2C%20trim%20Shave%2C%20Tawaf/Jamarat%20rooftop/index.htm?journey=15&context=12th-day'},
    {n:16, icon:'🕌', name:"Farewell Tawaf al-Wida'",    url:'/pilgrimspath-vr/pilgrims%20path%20main/1%20Tawaf/index.htm?journey=16&context=farewell'}
  ];

  var saved = JSON.parse(localStorage.getItem('journeyState')||'{}');
  var currentStep = saved.currentStep || 0;

  var grid = document.getElementById('stepsGrid');
  STEPS.forEach(function(s){
    var a = document.createElement('a');
    a.className = 'step-link';
    a.href = s.url;
    var done = s.n < currentStep;
    var active = s.n === currentStep;
    if(done) a.style.opacity='0.6';
    if(active) a.style.background='rgba(212,175,55,0.22)';
    a.innerHTML = '<span class="step-num">' + s.n + '</span>'
      + '<span style="font-size:1rem">' + s.icon + '</span>'
      + '<span>' + s.name + '</span>'
      + (done ? '<span style="margin-left:auto;color:#22c55e">✓</span>' : '')
      + (active ? '<span style="margin-left:auto;color:#C9A227">▶</span>' : '');
    grid.appendChild(a);
  });
  </script>
</body>
</html>
