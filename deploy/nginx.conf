# Nginx config for pilgrimspath.io
# Place at: /etc/nginx/sites-available/pilgrimspath
# Then: sudo ln -s /etc/nginx/sites-available/pilgrimspath /etc/nginx/sites-enabled/
# Then: sudo nginx -t && sudo systemctl reload nginx

# Redirect HTTP → HTTPS
server {
    listen 80;
    listen [::]:80;
    server_name pilgrimspath.io www.pilgrimspath.io;
    return 301 https://$host$request_uri;
}

# Main HTTPS server
server {
    listen 443 ssl http2;
    listen [::]:443 ssl http2;
    server_name pilgrimspath.io www.pilgrimspath.io;

    # ── SSL (Let's Encrypt via Certbot) ──
    ssl_certificate     /etc/letsencrypt/live/pilgrimspath.io/fullchain.pem;
    ssl_certificate_key /etc/letsencrypt/live/pilgrimspath.io/privkey.pem;
    include             /etc/letsencrypt/options-ssl-nginx.conf;
    ssl_dhparam         /etc/letsencrypt/ssl-dhparams.pem;

    # ── Security headers ──
    add_header X-Content-Type-Options    "nosniff"                          always;
    add_header X-Frame-Options           "SAMEORIGIN"                       always;
    add_header Referrer-Policy           "strict-origin-when-cross-origin"  always;
    add_header Permissions-Policy        "geolocation=(), microphone=(), camera=(self), gyroscope=(self), accelerometer=(self)" always;
    add_header Strict-Transport-Security "max-age=31536000; includeSubDomains" always;

    # ── Gzip ──
    gzip on;
    gzip_types text/plain text/css application/javascript application/json image/svg+xml;
    gzip_vary on;

    # ── Max body size (for API posts) ──
    client_max_body_size 1m;

    # ── Admin route alias ──
    location = /sanctum-admin-7f3k9q2m {
        proxy_pass http://127.0.0.1:3000/sanctum-admin-7f3k9q2m;
        proxy_http_version 1.1;
        proxy_set_header Host              $host;
        proxy_set_header X-Real-IP         $remote_addr;
        proxy_set_header X-Forwarded-For   $proxy_add_x_forwarded_for;
        proxy_set_header X-Forwarded-Proto $scheme;
    }

    # ── API routes → Node.js ──
    location /api/ {
        proxy_pass http://127.0.0.1:3000;
        proxy_http_version 1.1;
        proxy_set_header Host              $host;
        proxy_set_header X-Real-IP         $remote_addr;
        proxy_set_header X-Forwarded-For   $proxy_add_x_forwarded_for;
        proxy_set_header X-Forwarded-Proto $scheme;
        proxy_read_timeout 30s;
    }

    # ── Static files — serve directly from Nginx for speed ──
    root /var/www/pilgrimspath;

    # Large VR assets — aggressive cache
    location ~* \.(htm|html)$ {
        add_header Cache-Control "no-cache, no-store, must-revalidate";
        try_files $uri $uri/ @node;
    }

    location ~* \.(js|css|png|jpg|jpeg|gif|svg|ico|woff|woff2|mp3|mp4|webm|json)$ {
        expires 7d;
        add_header Cache-Control "public, max-age=604800, immutable";
        try_files $uri =404;
    }

    # Fallback to Node for anything not a direct file
    location / {
        try_files $uri $uri/ @node;
    }

    location @node {
        proxy_pass http://127.0.0.1:3000;
        proxy_http_version 1.1;
        proxy_set_header Host              $host;
        proxy_set_header X-Real-IP         $remote_addr;
        proxy_set_header X-Forwarded-For   $proxy_add_x_forwarded_for;
        proxy_set_header X-Forwarded-Proto $scheme;
    }

    # ── Block hidden files ──
    location ~ /\. {
        deny all;
        return 404;
    }

    # ── Access log ──
    access_log /var/log/nginx/pilgrimspath_access.log;
    error_log  /var/log/nginx/pilgrimspath_error.log;
}
